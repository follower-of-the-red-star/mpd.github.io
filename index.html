<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TERMINUS v2.3 — Secure Terminal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --green-dim: #00b32d;
      --green-dark: #003b0c;
      --green-glow: rgba(0, 255, 65, 0.18);
      --bg: #0a0a0a;
      --scanline: rgba(0,0,0,0.13);
      --amber: #ffb300;
      --red: #ff3333;
      --cyan: #00e5ff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      overflow: hidden;
    }

    #crt-shell {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #111 0%, #000 100%);
    }

    #monitor {
      width: min(900px, 98vw);
      height: min(620px, 98vh);
      border: 3px solid #1a1a1a;
      border-radius: 12px;
      box-shadow:
        0 0 0 6px #111,
        0 0 0 8px #222,
        0 0 60px rgba(0,255,65,0.08),
        inset 0 0 80px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      background: #050505;
    }

    #monitor::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        var(--scanline) 3px,
        var(--scanline) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #monitor::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 11;
    }

    @keyframes flicker {
      0%   { opacity: 1; }
      92%  { opacity: 1; }
      93%  { opacity: 0.97; }
      94%  { opacity: 1; }
      96%  { opacity: 0.95; }
      97%  { opacity: 1; }
      100% { opacity: 1; }
    }

    #screen {
      width: 100%;
      height: 100%;
      padding: 18px 22px 12px;
      display: flex;
      flex-direction: column;
      animation: flicker 8s infinite;
      position: relative;
      z-index: 1;
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--green-dim);
      padding-bottom: 6px;
      margin-bottom: 8px;
      color: var(--green-dim);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #header .title { color: var(--green); font-size: 13px; letter-spacing: 3px; }
    #clock { font-size: 11px; }
    #cred-badge { font-size: 10px; color: var(--amber); margin-left: 12px; }

    #content-area {
      flex: 1;
      display: flex;
      gap: 12px;
      min-height: 0;
      overflow: hidden;
    }

    #output {
      flex: 2;
      overflow-y: auto;
      overflow-x: hidden;
      line-height: 1.6;
      padding-right: 4px;
      text-shadow: 0 0 6px var(--green-glow);
    }

    #image-panel {
      flex: 1;
      background: rgba(0, 0, 0, 0.6);
      border-left: 1px solid var(--green-dim);
      padding: 8px;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    #image-panel img {
      max-width: 100%;
      max-height: 300px;
      object-fit: contain;
      border: 1px solid var(--green-dim);
      box-shadow: 0 0 12px var(--green-glow);
      margin-bottom: 8px;
    }

    #image-panel .image-caption {
      font-size: 11px;
      color: var(--green-dim);
      text-align: center;
      word-break: break-all;
    }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }
    #image-panel::-webkit-scrollbar { width: 4px; }
    #image-panel::-webkit-scrollbar-track { background: transparent; }
    #image-panel::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }

    .line { white-space: pre-wrap; word-break: break-word; }
    .line.system { color: var(--green-dim); }
    .line.prompt-echo { color: var(--green); }
    .line.error { color: var(--red); text-shadow: 0 0 8px rgba(255,50,50,0.4); }
    .line.info { color: var(--cyan); text-shadow: 0 0 6px rgba(0,229,255,0.3); }
    .line.header-line { color: var(--amber); text-shadow: 0 0 8px rgba(255,180,0,0.3); }
    .line.blank { min-height: 1em; }
    .line.file-content { color: #c8ffd4; }

    #input-row {
      display: flex;
      align-items: center;
      margin-top: 8px;
      border-top: 1px solid var(--green-dark);
      padding-top: 8px;
      flex-shrink: 0;
    }

    #prompt-label {
      color: var(--amber);
      margin-right: 6px;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(255,180,0,0.4);
      font-size: 14px;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      caret-color: var(--green);
      text-shadow: 0 0 6px var(--green-glow);
    }

    @keyframes blink { 0%,100%{border-right-color:var(--green)} 50%{border-right-color:transparent} }
    #input { border-right: 2px solid var(--green); animation: blink 1s step-end infinite; padding-right: 2px; }

    @keyframes bootIn {
      from { opacity: 0; transform: scaleY(0.02); }
      to   { opacity: 1; transform: scaleY(1); }
    }
    #monitor { animation: bootIn 0.4s ease-out; }

    #power-led {
      position: absolute;
      bottom: 10px;
      right: 14px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 2s ease-in-out infinite;
      z-index: 20;
    }

    /* Modal for credential input */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(3px);
    }
    .modal-content {
      background: #0a0a0a;
      border: 2px solid var(--green);
      padding: 24px;
      width: 350px;
      text-align: center;
      box-shadow: 0 0 30px var(--green-glow);
    }
    .modal-content p {
      margin-bottom: 16px;
      color: var(--green);
    }
    .modal-content input {
      background: #000;
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      padding: 8px;
      width: 100%;
      text-align: center;
      letter-spacing: 2px;
    }
    .modal-content input:focus {
      outline: none;
      border-color: var(--green);
    }
    .modal-content button {
      margin-top: 16px;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      padding: 6px 16px;
      font-family: monospace;
      cursor: pointer;
    }
    .modal-content button:hover {
      background: var(--green-dark);
    }
  </style>
  <script src="terminal_data.js"></script>
</head>
<body>
<div id="crt-shell">
  <div id="monitor">
    <div id="screen">
      <div id="header">
        <span class="title">◈ TERMINUS v2.3</span>
        <span id="clock">--:--:--</span>
        <span id="cred-badge"></span>
        <span>SECURE TERMINAL</span>
      </div>
      <div id="content-area">
        <div id="output"></div>
        <div id="image-panel"></div>
      </div>
      <div id="input-row">
        <span id="prompt-label">C:\&gt;</span>
        <input id="input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" disabled />
      </div>
    </div>
    <div id="power-led"></div>
  </div>
</div>

<script>
// ─── GLOBALS ───────────────────────────────────────────────────────────────
let currentFolder = null;      // e.g., "shared", "agent_rees"
let currentFiles = [];         // list of .txt files in that folder
let credentialsMap = {};       // code -> folder
let filesMap = {};             // folder -> [file list]

// Load data from terminal_data.js (must be loaded before this script)
if (typeof window.TERMINAL_DATA !== 'undefined') {
  credentialsMap = window.TERMINAL_DATA.credentials || {};
  filesMap = window.TERMINAL_DATA.files || {};
} else {
  console.error("terminal_data.js not loaded. Run update_index.bat");
}

// DOM elements
const output = document.getElementById('output');
const input = document.getElementById('input');
const promptLabel = document.getElementById('prompt-label');
const imagePanel = document.getElementById('image-panel');
const credBadge = document.getElementById('cred-badge');

// ─── HELPER FUNCTIONS ─────────────────────────────────────────────────────
function print(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function printBlank() { print('', 'blank'); }

async function printSlow(lines, cls = '', delayBase = 18) {
  for (const line of lines) {
    print(line, cls);
    await new Promise(r => setTimeout(r, delayBase + Math.random() * 12));
  }
}

function printDivider(char = '─', len = 58) {
  print(char.repeat(len), 'header-line');
}

function clearImage() {
  imagePanel.innerHTML = '';
  imagePanel.style.display = 'none';
}

function showImage(url, altText = '') {
  clearImage();
  const img = document.createElement('img');
  img.src = url;
  img.alt = altText;
  img.onerror = () => {
    imagePanel.innerHTML = '<div class="error">[Image failed to load]</div>';
    imagePanel.style.display = 'flex';
  };
  const caption = document.createElement('div');
  caption.className = 'image-caption';
  caption.textContent = url.length > 60 ? url.substring(0,57)+'...' : url;
  imagePanel.appendChild(img);
  imagePanel.appendChild(caption);
  imagePanel.style.display = 'flex';
}

function extractImageUrl(firstLine) {
  const line = firstLine.trim();
  const mdMatch = line.match(/!\[.*?\]\((https?:\/\/[^\s)]+)\)/);
  if (mdMatch) return mdMatch[1];
  if (line.toLowerCase().startsWith('img:')) return line.substring(4).trim();
  const urlMatch = line.match(/^(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp)(\?.*)?)$/i);
  if (urlMatch) return urlMatch[1];
  return null;
}

async function loadFileContent(filename) {
  try {
    const response = await fetch(`${currentFolder}/${filename}`);
    if (response.ok) {
      return { success: true, content: await response.text() };
    } else {
      throw new Error(`HTTP ${response.status}`);
    }
  } catch (e) {
    return { success: false, error: `File not found: ${filename}` };
  }
}

// ─── COMMANDS (all use currentFolder and currentFiles) ────────────────────
const commands = {
  help: async () => {
    printBlank();
    print('AVAILABLE COMMANDS', 'header-line');
    printDivider();
    print('  HELP              — Show this help screen', 'info');
    print('  DIR               — List files in current folder', 'info');
    print('  READ <file>       — Display a file', 'info');
    print('  TYPE <file>       — Alias for READ', 'info');
    print('  CLS               — Clear screen', 'info');
    print('  ECHO <text>       — Print text', 'info');
    print('  VER               — Version info', 'info');
    print('  LOGIN <code>      — Switch to another credential', 'info');
    printBlank();
    print(`Current folder: ${currentFolder}`, 'system');
    printBlank();
  },

  dir: async () => {
    printBlank();
    print(` Volume in drive C is TERMINUS (${currentFolder})`, 'system');
    print(` Directory of C:\\${currentFolder}`, 'system');
    printBlank();
    printDivider();
    if (currentFiles.length === 0) {
      print('  (no .txt files found in this folder)', 'error');
    } else {
      const now = new Date();
      const dateStr = [now.getDate(), now.getMonth()+1, now.getFullYear()]
        .map(n=>String(n).padStart(2,'0')).join('-');
      for (const f of currentFiles) {
        print(`  ${f.padEnd(24)}  <TXT>    ${dateStr}`, 'file-content');
      }
    }
    printDivider();
    print(`  ${currentFiles.length} file(s)`, 'system');
    printBlank();
  },

  read: async (args) => {
    if (!args || args.length === 0) {
      print('Syntax: READ <filename>', 'error');
      return;
    }
    let name = args.join(' ').trim();
    if (!name.endsWith('.txt')) name += '.txt';
    if (!currentFiles.includes(name)) {
      print(`File not found: ${name}`, 'error');
      print(`Use DIR to see available files.`, 'system');
      return;
    }
    print(`Loading ${name} ...`, 'system');
    const result = await loadFileContent(name);
    if (result.success) {
      const lines = result.content.split(/\r?\n/);
      let imageUrl = null;
      let contentLines = lines;
      if (lines.length > 0) {
        imageUrl = extractImageUrl(lines[0]);
        if (imageUrl) {
          contentLines = lines.slice(1);
          if (contentLines.length > 0 && contentLines[0].trim() === '')
            contentLines = contentLines.slice(1);
        }
      }
      if (imageUrl) showImage(imageUrl, name);
      else clearImage();
      printBlank();
      printDivider('─');
      if (contentLines.length === 0 && imageUrl) print('[Image only – no text]', 'system');
      else if (contentLines.length === 0 && !imageUrl) print('[Empty file]', 'system');
      else await printSlow(contentLines, 'file-content', 12);
      printDivider('─');
      printBlank();
    } else {
      print(`Error: ${result.error}`, 'error');
    }
  },

  cls: async () => {
    output.innerHTML = '';
    clearImage();
  },

  echo: async (args) => {
    print(args.join(' '), 'file-content');
  },

  ver: async () => {
    printBlank();
    print('TERMINUS v2.3 — Secure Campaign Terminal', 'header-line');
    print('Multi‑user credential system', 'system');
    printBlank();
  },

  login: async (args) => {
    if (!args || args.length === 0) {
      print('Syntax: LOGIN <code>', 'error');
      return;
    }
    const code = args[0].toUpperCase();
    if (credentialsMap[code]) {
      const newFolder = credentialsMap[code];
      if (filesMap[newFolder]) {
        currentFolder = newFolder;
        currentFiles = filesMap[newFolder];
        credBadge.textContent = `🔑 ${code}`;
        print(`Access granted. Now in folder: ${currentFolder}`, 'system');
        printBlank();
      } else {
        print(`Error: Folder '${newFolder}' has no file list.`, 'error');
      }
    } else {
      print(`Invalid credential code: ${code}`, 'error');
    }
  }
};

commands.type = commands.read;
commands.clear = commands.cls;
commands.ls = commands.dir;

// ─── CREDENTIAL MODAL ──────────────────────────────────────────────────────
function showCredentialModal() {
  return new Promise((resolve) => {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <p>🔐 INPUT CREDENTIAL CODE</p>
        <input type="text" id="cred-input" autocomplete="off" autofocus />
        <br />
        <button id="cred-submit">AUTHENTICATE</button>
      </div>
    `;
    document.body.appendChild(modal);
    const inputField = modal.querySelector('#cred-input');
    const submitBtn = modal.querySelector('#cred-submit');
    const handler = () => {
      let code = inputField.value.trim().toUpperCase();
      if (code === '') code = 'SHARED'; // default
      if (credentialsMap[code]) {
        const folder = credentialsMap[code];
        if (filesMap[folder]) {
          currentFolder = folder;
          currentFiles = filesMap[folder];
          credBadge.textContent = `🔑 ${code}`;
          modal.remove();
          resolve(true);
        } else {
          inputField.value = '';
          inputField.placeholder = 'No files in that folder';
        }
      } else {
        inputField.value = '';
        inputField.placeholder = 'Invalid code';
      }
    };
    submitBtn.addEventListener('click', handler);
    inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') handler(); });
  });
}

// ─── BOOT SEQUENCE ─────────────────────────────────────────────────────────
async function boot() {
  // Wait for user to enter credentials
  await showCredentialModal();

  // Now enable the terminal
  input.disabled = false;
  input.focus();

  // Boot messages
  print('TERMINUS BIOS v2.3  (C) 1988 OBSCURA SYSTEMS INC.', 'system');
  await new Promise(r => setTimeout(r, 200));
  print('Memory Test: 640K OK', 'system');
  await new Promise(r => setTimeout(r, 150));
  print('Loading TERMINUS.SYS ...', 'system');
  await new Promise(r => setTimeout(r, 180));
  print(`Mounting secure partition: ${currentFolder} ...`, 'system');
  await new Promise(r => setTimeout(r, 120));
  print('', 'blank');
  printDivider('═');
  print('                                     __   ______    ______  
  print('                                    ╱  │ ╱      ╲  ╱      ╲ ', 'header-line');
  print('  ______   __    __   ______    ____$$ │╱$$$$$$  │╱$$$$$$  │', 'header-line');
  print(' ╱      ╲ ╱  │  ╱  │ ╱      ╲  ╱    $$ │$$ │  $$ │$$ ╲__$$╱ ', 'header-line');
  print('╱$$$$$$  │$$ │  $$ │ $$$$$$  │╱$$$$$$$ │$$ │  $$ │$$      ╲ ', 'header-line');
  print('$$ │  $$ │$$ │  $$ │ ╱    $$ │$$ │  $$ │$$ │  $$ │ $$$$$$  │', 'header-line');
  print('$$ ╲__$$ │$$ ╲__$$ │╱$$$$$$$ │$$ ╲__$$ │$$ ╲__$$ │╱  ╲__$$ │', 'header-line');
  print('$$    $$ │$$    $$╱ $$    $$ │$$    $$ │$$    $$╱ $$    $$╱ ', 'header-line');
  print(' $$$$$$$ │ $$$$$$╱   $$$$$$$╱  $$$$$$$╱  $$$$$$╱   $$$$$$╱  ', 'header-line');
  print('      $$ │                                                  ', 'header-line');
  print('      $$ │                                                  ', 'header-line');
  print('      $$╱                                                   ', 'header-line');
  printDivider('═');
  printBlank();
  print(`  WELCOME, AGENT. ACCESSING CASE: ${currentFolder}`, 'info');
  print('  Type HELP for available commands.', 'system');
  printBlank();
}

// ─── INPUT HANDLER ─────────────────────────────────────────────────────────
const history = [];
let histIdx = -1;

input.addEventListener('keydown', async (e) => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) histIdx++;
    input.value = history[histIdx] ?? '';
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) histIdx--;
    else { histIdx = -1; input.value = ''; return; }
    input.value = history[histIdx] ?? '';
    return;
  }
  if (e.key !== 'Enter') return;

  const raw = input.value.trim();
  input.value = '';
  histIdx = -1;
  if (!raw) return;

  history.unshift(raw);
  if (history.length > 50) history.pop();
  print(`C:\\> ${raw}`, 'prompt-echo');

  const parts = raw.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);

  if (commands[cmd]) {
    input.disabled = true;
    try {
      await commands[cmd](args);
    } finally {
      input.disabled = false;
      input.focus();
    }
  } else {
    print(`'${parts[0]}' is not recognized. Type HELP.`, 'error');
    printBlank();
  }
});

document.addEventListener('click', () => input.focus());

// Start everything
boot();
</script>
</body>
</html>
