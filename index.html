<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TERMINUS v2.3 — TTRPG Interface</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --green-dim: #00b32d;
      --green-dark: #003b0c;
      --green-glow: rgba(0, 255, 65, 0.18);
      --bg: #0a0a0a;
      --scanline: rgba(0,0,0,0.13);
      --amber: #ffb300;
      --red: #ff3333;
      --cyan: #00e5ff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      overflow: hidden;
    }

    #crt-shell {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #111 0%, #000 100%);
    }

    #monitor {
      width: min(900px, 98vw);
      height: min(620px, 98vh);
      border: 3px solid #1a1a1a;
      border-radius: 12px;
      box-shadow:
        0 0 0 6px #111,
        0 0 0 8px #222,
        0 0 60px rgba(0,255,65,0.08),
        inset 0 0 80px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      background: #050505;
    }

    #monitor::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        var(--scanline) 3px,
        var(--scanline) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #monitor::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 11;
    }

    @keyframes flicker {
      0%   { opacity: 1; }
      92%  { opacity: 1; }
      93%  { opacity: 0.97; }
      94%  { opacity: 1; }
      96%  { opacity: 0.95; }
      97%  { opacity: 1; }
      100% { opacity: 1; }
    }

    #screen {
      width: 100%;
      height: 100%;
      padding: 18px 22px 12px;
      display: flex;
      flex-direction: column;
      animation: flicker 8s infinite;
      position: relative;
      z-index: 1;
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--green-dim);
      padding-bottom: 6px;
      margin-bottom: 8px;
      color: var(--green-dim);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #header .title { color: var(--green); font-size: 13px; letter-spacing: 3px; }
    #clock { font-size: 11px; }

    #output {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      line-height: 1.6;
      padding-right: 4px;
      text-shadow: 0 0 6px var(--green-glow);
    }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }

    .line { white-space: pre-wrap; word-break: break-word; }
    .line.system { color: var(--green-dim); }
    .line.prompt-echo { color: var(--green); }
    .line.error { color: var(--red); text-shadow: 0 0 8px rgba(255,50,50,0.4); }
    .line.info { color: var(--cyan); text-shadow: 0 0 6px rgba(0,229,255,0.3); }
    .line.header-line { color: var(--amber); text-shadow: 0 0 8px rgba(255,180,0,0.3); }
    .line.blank { min-height: 1em; }
    .line.file-content { color: #c8ffd4; }

    #input-row {
      display: flex;
      align-items: center;
      margin-top: 8px;
      border-top: 1px solid var(--green-dark);
      padding-top: 8px;
      flex-shrink: 0;
    }

    #prompt-label {
      color: var(--amber);
      margin-right: 6px;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(255,180,0,0.4);
      font-size: 14px;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      caret-color: var(--green);
      text-shadow: 0 0 6px var(--green-glow);
    }

    @keyframes blink { 0%,100%{border-right-color:var(--green)} 50%{border-right-color:transparent} }
    #input { border-right: 2px solid var(--green); animation: blink 1s step-end infinite; padding-right: 2px; }

    @keyframes bootIn {
      from { opacity: 0; transform: scaleY(0.02); }
      to   { opacity: 1; transform: scaleY(1); }
    }
    #monitor { animation: bootIn 0.4s ease-out; }

    #power-led {
      position: absolute;
      bottom: 10px;
      right: 14px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 2s ease-in-out infinite;
      z-index: 20;
    }
  </style>
  <!-- Dynamically generated file index (created by update_index.bat) -->
  <script src="file-index.js"></script>
</head>
<body>
<div id="crt-shell">
  <div id="monitor">
    <div id="screen">
      <div id="header">
        <span class="title">◈ TERMINUS v2.3</span>
        <span id="clock">--:--:--</span>
        <span>SESSION ACTIVE</span>
      </div>
      <div id="output"></div>
      <div id="input-row">
        <span id="prompt-label">C:\&gt;</span>
        <input id="input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />
      </div>
    </div>
    <div id="power-led"></div>
  </div>
</div>

<script>
// ─── CONFIGURATION ──────────────────────────────────────────────────────────
const DATA_DIR = 'data/';

// Use the global FILE_INDEX set by file-index.js, or create an empty fallback.
// No 'var', 'let', or 'const' – we're just ensuring the variable exists.
if (typeof window.FILE_INDEX === 'undefined') {
  window.FILE_INDEX = [];
  console.warn("file-index.js not loaded – using empty array. Run update_index.bat to generate it.");
}

const PROMPT = 'C:\\>';

// ─── OUTPUT HELPERS ──────────────────────────────────────────────────────────
const output = document.getElementById('output');
const input  = document.getElementById('input');
const promptLabel = document.getElementById('prompt-label');
promptLabel.textContent = PROMPT;

function updateClock() {
  const now = new Date();
  const t = [now.getHours(), now.getMinutes(), now.getSeconds()]
    .map(n => String(n).padStart(2,'0')).join(':');
  document.getElementById('clock').textContent = t;
}
updateClock();
setInterval(updateClock, 1000);

function print(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function printBlank() { print('', 'blank'); }

function printSlow(lines, cls = '', delayBase = 18) {
  return new Promise(resolve => {
    let i = 0;
    function next() {
      if (i >= lines.length) { resolve(); return; }
      print(lines[i], cls);
      i++;
      setTimeout(next, delayBase + Math.random() * 12);
    }
    next();
  });
}

function printDivider(char = '─', len = 58) {
  print(char.repeat(len), 'header-line');
}

// ─── FILE LOADER (pure fetch, no embedded data) ───────────────────────────
async function loadFileContent(filename) {
  try {
    const response = await fetch(DATA_DIR + filename);
    if (response.ok) {
      const text = await response.text();
      return { success: true, content: text };
    } else {
      throw new Error(`HTTP ${response.status}`);
    }
  } catch (fetchError) {
    return { success: false, error: `File not found: ${filename}` };
  }
}

// ─── BOOT SEQUENCE ───────────────────────────────────────────────────────────
async function boot() {
  input.disabled = true;

  const bootLines = [
    'TERMINUS BIOS v2.3  (C) 1988 OBSCURA SYSTEMS INC.',
    'Memory Test: 640K OK',
    'Loading TERMINUS.SYS ...',
    'Mounting DATA partition ...',
    'Checking file index ...',
    '',
  ];

  for (const line of bootLines) {
    if (line === '') { printBlank(); await delay(80); continue; }
    print(line, 'system');
    await delay(90 + Math.random() * 60);
  }

  printDivider('═');
  print('  ████████╗███████╗██████╗ ███╗   ███╗██╗███╗   ██╗██╗   ██╗███████╗', 'header-line');
  print('  ╚══██╔══╝██╔════╝██╔══██╗████╗ ████║██║████╗  ██║██║   ██║██╔════╝', 'header-line');
  print('     ██║   █████╗  ██████╔╝██╔████╔██║██║██╔██╗ ██║██║   ██║███████╗', 'header-line');
  print('     ██║   ██╔══╝  ██╔══██╗██║╚██╔╝██║██║██║╚██╗██║██║   ██║╚════██║', 'header-line');
  print('     ██║   ███████╗██║  ██║██║ ╚═╝ ██║██║██║ ╚████║╚██████╔╝███████║', 'header-line');
  print('     ╚═╝   ╚══════╝╚═╝  ╚═╝╚═╝     ╚═╝╚═╝╚═╝  ╚═══╝ ╚═════╝ ╚══════╝', 'header-line');
  printDivider('═');
  printBlank();
  print('  CAMPAIGN INFORMATION RETRIEVAL SYSTEM', 'info');
  print('  Type HELP for available commands.', 'system');
  if (window.FILE_INDEX.length === 0) {
    print('  WARNING: No files in index. Run update_index.bat to generate file list.', 'error');
  }
  printBlank();

  input.disabled = false;
  input.focus();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── COMMANDS ────────────────────────────────────────────────────────────────
const commands = {

  help: async () => {
    const result = await loadFileContent('help.txt');
    if (result.success) {
      printBlank();
      printDivider('─');
      const lines = result.content.split('\n');
      await printSlow(lines, 'file-content', 12);
      printDivider('─');
      printBlank();
    } else {
      // Built-in fallback help (no campaign data)
      printBlank();
      print('AVAILABLE COMMANDS', 'header-line');
      printDivider();
      print('  HELP              — Show this help screen', 'info');
      print('  DIR               — List all available files', 'info');
      print('  READ <filename>   — Display a file  (e.g. READ lore.txt)', 'info');
      print('  TYPE <filename>   — Alias for READ', 'info');
      print('  CLS               — Clear the screen', 'info');
      print('  ECHO <text>       — Print text to screen', 'info');
      print('  VER               — Show version info', 'info');
      printBlank();
      print('  Files can be read without the .txt extension.', 'system');
      print('  Example:  READ tavern   →   reads data/tavern.txt', 'system');
      printBlank();
      print('NOTE: help.txt not found in data folder. Create it for custom help.', 'system');
      printBlank();
    }
  },

  dir: async () => {
    printBlank();
    print(' Volume in drive C is TERMINUS', 'system');
    print(' Directory of C:\\DATA', 'system');
    printBlank();
    printDivider();
    if (window.FILE_INDEX.length === 0) {
      print('  (no files found — run update_index.bat to generate file list)', 'error');
    } else {
      const now = new Date();
      const dateStr = [now.getDate(), now.getMonth()+1, now.getFullYear()]
        .map(n=>String(n).padStart(2,'0')).join('-');
      for (const f of window.FILE_INDEX) {
        const name = f.padEnd(24);
        print(`  ${name}  <TXT>    ${dateStr}`, 'file-content');
      }
    }
    printDivider();
    print(`  ${window.FILE_INDEX.length} file(s) in index.`, 'system');
    printBlank();
  },

  read: async (args) => {
    if (!args || args.length === 0) {
      print('Syntax: READ <filename>', 'error');
      return;
    }
    let name = args.join(' ').trim();
    if (!name.endsWith('.txt')) name += '.txt';

    if (!window.FILE_INDEX.includes(name)) {
      print(`File not found: ${name}`, 'error');
      print(`Use DIR to see available files.`, 'system');
      return;
    }

    print(`Loading ${name} ...`, 'system');
    const result = await loadFileContent(name);
    if (result.success) {
      printBlank();
      printDivider('─');
      const lines = result.content.split('\n');
      await printSlow(lines, 'file-content', 12);
      printDivider('─');
      printBlank();
    } else {
      print(`Error: ${result.error}`, 'error');
      print(`Make sure ${DATA_DIR}${name} exists.`, 'system');
    }
  },

  cls: async () => {
    output.innerHTML = '';
  },

  echo: async (args) => {
    print(args.join(' '), 'file-content');
  },

  ver: async () => {
    printBlank();
    print('TERMINUS v2.3  —  Campaign Information Retrieval System', 'header-line');
    print('Built on OBSCURA-DOS kernel 6.22', 'system');
    print('© 1988 Obscura Systems Inc. All rights reserved.', 'system');
    printBlank();
  },

  hello: async () => {
    printBlank();
    print('GREETINGS, TRAVELLER.', 'header-line');
    print('The terminal acknowledges your presence.', 'system');
    printBlank();
  },
};

commands.type = commands.read;
commands.clear = commands.cls;
commands.ls = commands.dir;

// ─── INPUT HANDLER ───────────────────────────────────────────────────────────
const history = [];
let histIdx = -1;

input.addEventListener('keydown', async (e) => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) histIdx++;
    input.value = history[histIdx] ?? '';
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) histIdx--;
    else { histIdx = -1; input.value = ''; return; }
    input.value = history[histIdx] ?? '';
    return;
  }
  if (e.key !== 'Enter') return;

  const raw = input.value.trim();
  input.value = '';
  histIdx = -1;

  if (!raw) return;

  history.unshift(raw);
  if (history.length > 50) history.pop();

  print(PROMPT + ' ' + raw, 'prompt-echo');

  const parts = raw.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);

  if (commands[cmd]) {
    input.disabled = true;
    try {
      await commands[cmd](args);
    } finally {
      input.disabled = false;
      input.focus();
    }
  } else {
    print(`'${parts[0]}' is not recognized as an internal command.`, 'error');
    print(`Type HELP for available commands.`, 'system');
    printBlank();
  }
});

document.addEventListener('click', () => input.focus());

boot();
</script>
</body>
</html>
