<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TERMINUS v2.3 вҖ” TTRPG Interface</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --green-dim: #00b32d;
      --green-dark: #003b0c;
      --green-glow: rgba(0, 255, 65, 0.18);
      --bg: #0a0a0a;
      --scanline: rgba(0,0,0,0.13);
      --amber: #ffb300;
      --red: #ff3333;
      --cyan: #00e5ff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      overflow: hidden;
    }

    #crt-shell {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #111 0%, #000 100%);
    }

    #monitor {
      width: min(900px, 98vw);
      height: min(620px, 98vh);
      border: 3px solid #1a1a1a;
      border-radius: 12px;
      box-shadow:
        0 0 0 6px #111,
        0 0 0 8px #222,
        0 0 60px rgba(0,255,65,0.08),
        inset 0 0 80px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      background: #050505;
    }

    #monitor::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        var(--scanline) 3px,
        var(--scanline) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #monitor::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 11;
    }

    @keyframes flicker {
      0%   { opacity: 1; }
      92%  { opacity: 1; }
      93%  { opacity: 0.97; }
      94%  { opacity: 1; }
      96%  { opacity: 0.95; }
      97%  { opacity: 1; }
      100% { opacity: 1; }
    }

    #screen {
      width: 100%;
      height: 100%;
      padding: 18px 22px 12px;
      display: flex;
      flex-direction: column;
      animation: flicker 8s infinite;
      position: relative;
      z-index: 1;
    }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--green-dim);
      padding-bottom: 6px;
      margin-bottom: 8px;
      color: var(--green-dim);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #header .title { color: var(--green); font-size: 13px; letter-spacing: 3px; }
    #clock { font-size: 11px; }

    /* Main content area with flex layout for left (text) and right (image) */
    #content-area {
      flex: 1;
      display: flex;
      gap: 12px;
      min-height: 0; /* allow flex child to shrink */
      overflow: hidden;
    }

    /* Left side: output text */
    #output {
      flex: 2;
      overflow-y: auto;
      overflow-x: hidden;
      line-height: 1.6;
      padding-right: 4px;
      text-shadow: 0 0 6px var(--green-glow);
    }

    /* Right side: image panel (hidden by default) */
    #image-panel {
      flex: 1;
      background: rgba(0, 0, 0, 0.6);
      border-left: 1px solid var(--green-dim);
      padding: 8px;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    #image-panel img {
      max-width: 100%;
      max-height: 300px;
      object-fit: contain;
      border: 1px solid var(--green-dim);
      box-shadow: 0 0 12px var(--green-glow);
      margin-bottom: 8px;
    }

    #image-panel .image-caption {
      font-size: 11px;
      color: var(--green-dim);
      text-align: center;
      word-break: break-all;
    }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }

    #image-panel::-webkit-scrollbar { width: 4px; }
    #image-panel::-webkit-scrollbar-track { background: transparent; }
    #image-panel::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }

    .line { white-space: pre-wrap; word-break: break-word; }
    .line.system { color: var(--green-dim); }
    .line.prompt-echo { color: var(--green); }
    .line.error { color: var(--red); text-shadow: 0 0 8px rgba(255,50,50,0.4); }
    .line.info { color: var(--cyan); text-shadow: 0 0 6px rgba(0,229,255,0.3); }
    .line.header-line { color: var(--amber); text-shadow: 0 0 8px rgba(255,180,0,0.3); }
    .line.blank { min-height: 1em; }
    .line.file-content { color: #c8ffd4; }

    #input-row {
      display: flex;
      align-items: center;
      margin-top: 8px;
      border-top: 1px solid var(--green-dark);
      padding-top: 8px;
      flex-shrink: 0;
    }

    #prompt-label {
      color: var(--amber);
      margin-right: 6px;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(255,180,0,0.4);
      font-size: 14px;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      caret-color: var(--green);
      text-shadow: 0 0 6px var(--green-glow);
    }

    @keyframes blink { 0%,100%{border-right-color:var(--green)} 50%{border-right-color:transparent} }
    #input { border-right: 2px solid var(--green); animation: blink 1s step-end infinite; padding-right: 2px; }

    @keyframes bootIn {
      from { opacity: 0; transform: scaleY(0.02); }
      to   { opacity: 1; transform: scaleY(1); }
    }
    #monitor { animation: bootIn 0.4s ease-out; }

    #power-led {
      position: absolute;
      bottom: 10px;
      right: 14px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 2s ease-in-out infinite;
      z-index: 20;
    }
  </style>
  <script src="file-index.js"></script>
</head>
<body>
<div id="crt-shell">
  <div id="monitor">
    <div id="screen">
      <div id="header">
        <span class="title">в—Ҳ TERMINUS v2.3</span>
        <span id="clock">--:--:--</span>
        <span>SESSION ACTIVE</span>
      </div>
      <div id="content-area">
        <div id="output"></div>
        <div id="image-panel"></div>
      </div>
      <div id="input-row">
        <span id="prompt-label">C:\&gt;</span>
        <input id="input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />
      </div>
    </div>
    <div id="power-led"></div>
  </div>
</div>

<script>
// в”Җв”Җв”Җ CONFIGURATION в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const DATA_DIR = 'data/';

// Global file index (from file-index.js)
if (typeof window.FILE_INDEX === 'undefined') {
  window.FILE_INDEX = [];
  console.warn("file-index.js not loaded вҖ“ using empty array. Run update_index.bat to generate it.");
}

const PROMPT = 'C:\\>';

// DOM elements
const output = document.getElementById('output');
const input = document.getElementById('input');
const promptLabel = document.getElementById('prompt-label');
const imagePanel = document.getElementById('image-panel');

promptLabel.textContent = PROMPT;

// в”Җв”Җв”Җ HELPERS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function updateClock() {
  const now = new Date();
  const t = [now.getHours(), now.getMinutes(), now.getSeconds()]
    .map(n => String(n).padStart(2,'0')).join(':');
  document.getElementById('clock').textContent = t;
}
updateClock();
setInterval(updateClock, 1000);

function print(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function printBlank() { print('', 'blank'); }

function printSlow(lines, cls = '', delayBase = 18) {
  return new Promise(resolve => {
    let i = 0;
    function next() {
      if (i >= lines.length) { resolve(); return; }
      print(lines[i], cls);
      i++;
      setTimeout(next, delayBase + Math.random() * 12);
    }
    next();
  });
}

function printDivider(char = 'в”Җ', len = 58) {
  print(char.repeat(len), 'header-line');
}

// Clear the image panel and hide it
function clearImage() {
  imagePanel.innerHTML = '';
  imagePanel.style.display = 'none';
}

// Show an image from URL
function showImage(url, altText = '') {
  clearImage();
  const img = document.createElement('img');
  img.src = url;
  img.alt = altText || 'Embedded image';
  img.onerror = () => {
    imagePanel.innerHTML = '<div class="error">[Image failed to load]</div>';
    imagePanel.style.display = 'flex';
  };
  const caption = document.createElement('div');
  caption.className = 'image-caption';
  caption.textContent = url.length > 60 ? url.substring(0, 57) + '...' : url;
  imagePanel.appendChild(img);
  imagePanel.appendChild(caption);
  imagePanel.style.display = 'flex';
}

// Parse first line for image URL
// Supported formats:
// - Plain URL ending with .jpg/.jpeg/.png/.gif/.webp
// - Markdown: ![alt](url)
// - Custom: IMG:url
function extractImageUrl(firstLine) {
  // Trim and check
  const line = firstLine.trim();
  // Markdown pattern
  const mdMatch = line.match(/!\[.*?\]\((https?:\/\/[^\s)]+)\)/);
  if (mdMatch) return mdMatch[1];
  // Custom IMG: prefix
  if (line.toLowerCase().startsWith('img:')) {
    return line.substring(4).trim();
  }
  // Plain URL with image extension
  const urlMatch = line.match(/^(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp)(\?.*)?)$/i);
  if (urlMatch) return urlMatch[1];
  return null;
}

// в”Җв”Җв”Җ FILE LOADER (no embedded data) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadFileContent(filename) {
  try {
    const response = await fetch(DATA_DIR + filename);
    if (response.ok) {
      const text = await response.text();
      return { success: true, content: text };
    } else {
      throw new Error(`HTTP ${response.status}`);
    }
  } catch (fetchError) {
    return { success: false, error: `File not found: ${filename}` };
  }
}

// в”Җв”Җв”Җ BOOT SEQUENCE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function boot() {
  input.disabled = true;

  const bootLines = [
    'TERMINUS BIOS v2.3  (C) 1988 OBSCURA SYSTEMS INC.',
    'Memory Test: 640K OK',
    'Loading TERMINUS.SYS ...',
    'Mounting DATA partition ...',
    'Checking file index ...',
    '',
  ];

  for (const line of bootLines) {
    if (line === '') { printBlank(); await delay(80); continue; }
    print(line, 'system');
    await delay(90 + Math.random() * 60);
  }

  printDivider('в•җ');
  print('  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—', 'header-line');
  print('  в•ҡв•җв•җв–Ҳв–Ҳв•”в•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ', 'header-line');
  print('     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—', 'header-line');
  print('     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘', 'header-line');
  print('     в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в•ҡв•җв•қ в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘', 'header-line');
  print('     в•ҡв•җв•қ   в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ     в•ҡв•җв•қв•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қ', 'header-line');
  printDivider('в•җ');
  printBlank();
  print('  CAMPAIGN INFORMATION RETRIEVAL SYSTEM', 'info');
  print('  Type HELP for available commands.', 'system');
  if (window.FILE_INDEX.length === 0) {
    print('  WARNING: No files in index. Run update_index.bat to generate file list.', 'error');
  }
  printBlank();

  input.disabled = false;
  input.focus();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// в”Җв”Җв”Җ COMMANDS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const commands = {

  help: async () => {
    const result = await loadFileContent('help.txt');
    if (result.success) {
      printBlank();
      printDivider('в”Җ');
      const lines = result.content.split('\n');
      await printSlow(lines, 'file-content', 12);
      printDivider('в”Җ');
      printBlank();
    } else {
      // Built-in fallback help
      printBlank();
      print('AVAILABLE COMMANDS', 'header-line');
      printDivider();
      print('  HELP              вҖ” Show this help screen', 'info');
      print('  DIR               вҖ” List all available files', 'info');
      print('  READ <filename>   вҖ” Display a file  (e.g. READ lore.txt)', 'info');
      print('  TYPE <filename>   вҖ” Alias for READ', 'info');
      print('  CLS               вҖ” Clear the screen', 'info');
      print('  ECHO <text>       вҖ” Print text to screen', 'info');
      print('  VER               вҖ” Show version info', 'info');
      printBlank();
      print('  Files can be read without the .txt extension.', 'system');
      print('  Example:  READ tavern   вҶ’   reads data/tavern.txt', 'system');
      printBlank();
      print('  IMAGE SUPPORT: If first line of a .txt file contains an image URL', 'info');
      print('  (plain URL ending with .jpg/.png, or ![alt](url), or IMG:url),', 'info');
      print('  the image will appear in the right panel.', 'info');
      printBlank();
      print('NOTE: help.txt not found in data folder. Create it for custom help.', 'system');
      printBlank();
    }
  },

  dir: async () => {
    printBlank();
    print(' Volume in drive C is TERMINUS', 'system');
    print(' Directory of C:\\DATA', 'system');
    printBlank();
    printDivider();
    if (window.FILE_INDEX.length === 0) {
      print('  (no files found вҖ” run update_index.bat to generate file list)', 'error');
    } else {
      const now = new Date();
      const dateStr = [now.getDate(), now.getMonth()+1, now.getFullYear()]
        .map(n=>String(n).padStart(2,'0')).join('-');
      for (const f of window.FILE_INDEX) {
        const name = f.padEnd(24);
        print(`  ${name}  <TXT>    ${dateStr}`, 'file-content');
      }
    }
    printDivider();
    print(`  ${window.FILE_INDEX.length} file(s) in index.`, 'system');
    printBlank();
  },

  read: async (args) => {
    if (!args || args.length === 0) {
      print('Syntax: READ <filename>', 'error');
      return;
    }
    let name = args.join(' ').trim();
    if (!name.endsWith('.txt')) name += '.txt';

    if (!window.FILE_INDEX.includes(name)) {
      print(`File not found: ${name}`, 'error');
      print(`Use DIR to see available files.`, 'system');
      return;
    }

    print(`Loading ${name} ...`, 'system');
    const result = await loadFileContent(name);
    if (result.success) {
      // Split content into lines
      const allLines = result.content.split(/\r?\n/);
      let imageUrl = null;
      let contentLines = allLines;

      // Check first non-empty line for image URL
      if (allLines.length > 0) {
        const firstLine = allLines[0];
        imageUrl = extractImageUrl(firstLine);
        if (imageUrl) {
          // Remove the first line from displayed content
          contentLines = allLines.slice(1);
          // Also remove any following empty line that might be just a blank after the URL
          if (contentLines.length > 0 && contentLines[0].trim() === '') {
            contentLines = contentLines.slice(1);
          }
        }
      }

      // Clear previous image and show new one if any
      if (imageUrl) {
        showImage(imageUrl, name);
      } else {
        clearImage();
      }

      // Display the content (skip image line)
      printBlank();
      printDivider('в”Җ');
      if (contentLines.length === 0 && imageUrl) {
        print('[Image only вҖ“ no additional text]', 'system');
      } else if (contentLines.length === 0 && !imageUrl) {
        print('[Empty file]', 'system');
      } else {
        await printSlow(contentLines, 'file-content', 12);
      }
      printDivider('в”Җ');
      printBlank();
    } else {
      print(`Error: ${result.error}`, 'error');
      print(`Make sure ${DATA_DIR}${name} exists.`, 'system');
      clearImage();
    }
  },

  cls: async () => {
    output.innerHTML = '';
    clearImage();
  },

  echo: async (args) => {
    print(args.join(' '), 'file-content');
  },

  ver: async () => {

    print('Built on OBSCURA-DOS kernel 6.22', 'system');
    print('В© 1988 Obscura Systems Inc. All rights reserved.', 'system');
    printBlank();
  },

  hello: async () => {

    print('GREETINGS, TRAVELLER.', 'header-line');

commands.type = commands.read;
commands.clear = commands.cls;
commands.ls = commands.dir;

// в”Җв”Җв”Җ INPUT HANDLER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const history = [];
let histIdx = -1;

input.addEventListener('keydown', async (e) => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) histIdx++;
    input.value = history[histIdx] ?? '';
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) histIdx--;
    else { histIdx = -1; input.value = ''; return; }
    input.value = history[histIdx] ?? '';
    return;
  }
  if (e.key !== 'Enter') return;

  const raw = input.value.trim();
  input.value = '';
  histIdx = -1;

  if (!raw) return;

  history.unshift(raw);
  if (history.length > 50) history.pop();

  print(PROMPT + ' ' + raw, 'prompt-echo');

  const parts = raw.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);

  if (commands[cmd]) {
    input.disabled = true;
    try {
      await commands[cmd](args);
    } finally {
      input.disabled = false;
      input.focus();
    }
  } else {
    print(`'${parts[0]}' is not recognized as an internal command.`, 'error');
    print(`Type HELP for available commands.`, 'system');
    printBlank();
  }
});

document.addEventListener('click', () => input.focus());

boot();
</script>
